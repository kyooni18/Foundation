services:
  db:
    image: pgvector/pgvector:pg17
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/foundation/dbdata
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  main:
    image: kyooni18/foundation-main
    env_file: .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      EMBEDDINGS_TABLE: ${EMBEDDINGS_TABLE:-atoms_db}
      INIT_MASTER_KEY: ${INIT_MASTER_KEY}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-qwen3}
      QWEN_MODEL: ${QWEN_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  dbdata:
