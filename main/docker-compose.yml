services:
  db:
    image: pgvector/pgvector:pg17
    env_file: ../.env
    ports:
      - "5432:5432"
    volumes:
      - ./database/dbdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  main:
    image: kyooni18/foundation-main
    build:
      context: .
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./vault_storage:/app/vault_storage
    restart: unless-stopped
